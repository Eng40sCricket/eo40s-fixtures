<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>England Over 40s Cricket — Fixtures & Results</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; line-height: 1.5; }

  .eo40-wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }

  .eo40-header { text-align: center; padding: 24px 16px 12px; }
  .eo40-header h1 { font-size: 1.5rem; color: #1a3a5c; margin-bottom: 4px; }
  .eo40-header p { font-size: 0.9rem; color: #5a6a7a; }

  .eo40-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
  .eo40-tab { padding: 8px 18px; border: 2px solid #1a3a5c; border-radius: 24px; background: #fff; color: #1a3a5c; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .eo40-tab:hover { background: #e8eef5; }
  .eo40-tab.active { background: #1a3a5c; color: #fff; }

  .eo40-stats { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .eo40-stat { text-align: center; min-width: 55px; }
  .eo40-stat-val { font-size: 1.4rem; font-weight: 700; color: #1a3a5c; }
  .eo40-stat-lbl { font-size: 0.65rem; text-transform: uppercase; color: #7a8a9a; letter-spacing: 0.5px; }

  .eo40-section { margin-bottom: 20px; }
  .eo40-section-title { font-size: 1.1rem; font-weight: 700; color: #1a3a5c; padding: 10px 0 8px; border-bottom: 2px solid #1a3a5c; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .eo40-section-badge { font-size: 0.7rem; background: #1a3a5c; color: #fff; padding: 2px 10px; border-radius: 10px; }

  .eo40-table-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .eo40-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.82rem; }
  .eo40-table thead th { background: #1a3a5c; color: #fff; padding: 10px 8px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; white-space: nowrap; }
  .eo40-table tbody td { padding: 8px; border-bottom: 1px solid #eef0f3; vertical-align: middle; }
  .eo40-table tbody tr.eo40-win { background: #e8f5e9; }
  .eo40-table tbody tr.eo40-loss { background: #ffebee; }
  .eo40-table tbody tr.eo40-tie { background: #fff9c4; }
  .eo40-table tbody tr.eo40-noresult { background: #f5f5f5; }
  .eo40-table tbody tr.eo40-upcoming { background: #e8eef5; }
  .eo40-table tbody tr:hover { filter: brightness(0.97); }

  .eo40-team-cell { display: flex; align-items: center; gap: 6px; }
  .eo40-team-img { width: 28px; height: 28px; object-fit: contain; border-radius: 50%; background: #fff; border: 1px solid #eee; flex-shrink: 0; }
  .eo40-england { font-weight: 700; }

  .eo40-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
  .eo40-badge-odi { background: #1565c0; color: #fff; }
  .eo40-badge-wc { background: #f57c00; color: #fff; }
  .eo40-badge-tc { background: #7b1fa2; color: #fff; }
  .eo40-badge-friendly { background: #2e7d32; color: #fff; }
  .eo40-badge-t20 { background: #c62828; color: #fff; }
  .eo40-badge-nonodi { background: #546e7a; color: #fff; }
  .eo40-badge-upcoming { background: #1a3a5c; color: #fff; }

  .eo40-result { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
  .eo40-result-win { background: #2e7d32; color: #fff; }
  .eo40-result-loss { background: #c62828; color: #fff; }
  .eo40-result-tie { background: #f9a825; color: #333; }
  .eo40-result-noresult { background: #757575; color: #fff; }
  .eo40-result-upcoming { background: #1a3a5c; color: #fff; }

  .eo40-link { color: #1a3a5c; text-decoration: none; font-weight: 600; font-size: 0.75rem; white-space: nowrap; }
  .eo40-link:hover { text-decoration: underline; }
  .eo40-venue-link { color: #555; text-decoration: none; font-size: 0.8rem; }
  .eo40-venue-link:hover { color: #1a3a5c; text-decoration: underline; }
  .eo40-links-cell { display: flex; gap: 8px; align-items: center; }

  /* === Mobile Cards === */
  .eo40-cards { display: none; }
  .eo40-card { background: #fff; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; border-left: 5px solid #ccc; }
  .eo40-card.eo40-win { border-left-color: #2e7d32; }
  .eo40-card.eo40-loss { border-left-color: #c62828; }
  .eo40-card.eo40-tie { border-left-color: #f9a825; }
  .eo40-card.eo40-noresult { border-left-color: #757575; }
  .eo40-card.eo40-upcoming { border-left-color: #1a3a5c; }
  .eo40-card-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px 4px; }
  .eo40-card-date { font-size: 0.8rem; color: #5a6a7a; font-weight: 600; }
  .eo40-card-badges { display: flex; gap: 4px; align-items: center; }
  .eo40-card-teams { display: flex; align-items: center; justify-content: center; padding: 10px 12px; gap: 14px; }
  .eo40-card-team { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 80px; }
  .eo40-card-team img { width: 44px; height: 44px; object-fit: contain; border-radius: 50%; background: #fff; border: 1px solid #eee; }
  .eo40-card-team span { font-size: 0.72rem; font-weight: 600; text-align: center; line-height: 1.2; }
  .eo40-card-vs { font-size: 0.85rem; font-weight: 700; color: #bbb; }
  .eo40-card-bottom { padding: 8px 12px 10px; border-top: 1px solid #f0f0f0; }
  .eo40-card-detail { font-size: 0.75rem; color: #555; font-style: italic; margin-bottom: 4px; }
  .eo40-card-venue { font-size: 0.72rem; color: #888; margin-bottom: 6px; }
  .eo40-card-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .eo40-card-link { font-size: 0.72rem; color: #1a3a5c; text-decoration: none; font-weight: 600; padding: 4px 12px; border: 1.5px solid #1a3a5c; border-radius: 14px; transition: all 0.2s; }
  .eo40-card-link:hover { background: #1a3a5c; color: #fff; }

  .eo40-footer { text-align: center; padding: 16px; font-size: 0.72rem; color: #888; margin-top: 12px; }
  .eo40-legend { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  .eo40-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; }
  .eo40-legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .eo40-loading { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }

  @media (max-width: 768px) {
    .eo40-table-wrap { display: none !important; }
    .eo40-cards { display: block !important; }
    .eo40-header h1 { font-size: 1.2rem; }
    .eo40-stats { gap: 8px; padding: 10px 8px; }
    .eo40-stat-val { font-size: 1.1rem; }
    .eo40-stat-lbl { font-size: 0.6rem; }
    .eo40-tab { padding: 6px 14px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="eo40-wrap">
  <div class="eo40-header">
    <h1>England Over 40s Cricket — Fixtures & Results</h1>
    <p>Seasons 2023 to 2026</p>
  </div>

  <div class="eo40-tabs" id="eo40-tabs">
    <button class="eo40-tab active" data-season="all">All Seasons</button>
    <button class="eo40-tab" data-season="2026">2026</button>
    <button class="eo40-tab" data-season="2025">2025</button>
    <button class="eo40-tab" data-season="2024">2024</button>
    <button class="eo40-tab" data-season="2023">2023</button>
  </div>

  <div class="eo40-stats" id="eo40-stats"></div>

  <div class="eo40-loading" id="eo40-loading">Loading fixtures data...</div>

  <div id="eo40-content"></div>

  <div class="eo40-footer">
    <div class="eo40-legend">
      <span class="eo40-legend-item"><span class="eo40-legend-dot" style="background:#1a3a5c;"></span> Upcoming</span>
      <span class="eo40-legend-item"><span class="eo40-legend-dot" style="background:#2e7d32;"></span> Win</span>
      <span class="eo40-legend-item"><span class="eo40-legend-dot" style="background:#c62828;"></span> Loss</span>
      <span class="eo40-legend-item"><span class="eo40-legend-dot" style="background:#f9a825;"></span> Tie</span>
      <span class="eo40-legend-item"><span class="eo40-legend-dot" style="background:#757575;"></span> No Result</span>
    </div>
    <p>Source: englandseniors.play-cricket.com & triplecrown.play-cricket.com<br>Click scorecard links for full match details. Venue links open Google Maps.</p>
  </div>
</div>

<script>
(function() {
  var CSV_URL = 'matches.csv';

  function parseCSV(text) {
    var lines = text.trim().split('\n');
    var headers = parseCSVLine(lines[0]);
    var data = [];
    for (var i = 1; i < lines.length; i++) {
      var vals = parseCSVLine(lines[i]);
      if (vals.length < 2) continue;
      var row = {};
      for (var j = 0; j < headers.length; j++) {
        row[headers[j].trim()] = (vals[j] || '').trim();
      }
      data.push(row);
    }
    return data;
  }

  function parseCSVLine(line) {
    var result = [], current = '', inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQuotes) {
        if (ch === '"') {
          if (i + 1 < line.length && line[i + 1] === '"') { current += '"'; i++; }
          else { inQuotes = false; }
        } else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current);
    return result;
  }

  function badgeClass(t) {
    var tl = t.toLowerCase();
    if (tl.indexOf('world cup') >= 0) return 'eo40-badge-wc';
    if (tl.indexOf('triple crown') >= 0) return 'eo40-badge-tc';
    if (tl.indexOf('t20') >= 0) return 'eo40-badge-t20';
    if (tl.indexOf('non-odi') >= 0) return 'eo40-badge-nonodi';
    if (tl.indexOf('friendly') >= 0) return 'eo40-badge-friendly';
    if (tl.indexOf('odi') >= 0) return 'eo40-badge-odi';
    return 'eo40-badge-friendly';
  }

  function resultClass(r) {
    var rl = r.toLowerCase().trim();
    if (rl === 'win') return 'eo40-win';
    if (rl === 'loss') return 'eo40-loss';
    if (rl === 'tie') return 'eo40-tie';
    if (rl === 'upcoming') return 'eo40-upcoming';
    return 'eo40-noresult';
  }

  function resultBadgeClass(r) {
    var rl = r.toLowerCase().trim();
    if (rl === 'win') return 'eo40-result-win';
    if (rl === 'loss') return 'eo40-result-loss';
    if (rl === 'tie') return 'eo40-result-tie';
    if (rl === 'upcoming') return 'eo40-result-upcoming';
    return 'eo40-result-noresult';
  }

  function isEngland(team) { return team.toLowerCase().indexOf('england') >= 0; }

  function shortTeam(name) {
    return name.replace(/ Over 40s/gi, '').replace(/ Over 40/gi, '').replace(/Veterans Cricket /gi, '').trim();
  }

  function teamCellHTML(team, emblem) {
    var cls = isEngland(team) ? ' eo40-england' : '';
    var img = emblem ? '<img class="eo40-team-img" src="images/' + emblem + '" alt="">' : '';
    return '<div class="eo40-team-cell">' + img + '<span class="' + cls + '">' + shortTeam(team) + '</span></div>';
  }

  var allMatches = [];

  function renderStats(matches) {
    var played = matches.filter(function(m) { return m.Result.toLowerCase() !== 'upcoming'; });
    var upcoming = matches.filter(function(m) { return m.Result.toLowerCase() === 'upcoming'; });
    var wins = 0, losses = 0, ties = 0, nr = 0;
    for (var i = 0; i < played.length; i++) {
      var rl = played[i].Result.toLowerCase().trim();
      if (rl === 'win') wins++;
      else if (rl === 'loss') losses++;
      else if (rl === 'tie') ties++;
      else nr++;
    }
    var denom = played.length - nr;
    var pct = denom > 0 ? Math.round((wins / denom) * 100) : 0;

    var html = '';
    if (played.length > 0) {
      html += '<div class="eo40-stat"><div class="eo40-stat-val">' + played.length + '</div><div class="eo40-stat-lbl">Played</div></div>';
      html += '<div class="eo40-stat"><div class="eo40-stat-val" style="color:#2e7d32">' + wins + '</div><div class="eo40-stat-lbl">Won</div></div>';
      html += '<div class="eo40-stat"><div class="eo40-stat-val" style="color:#c62828">' + losses + '</div><div class="eo40-stat-lbl">Lost</div></div>';
      html += '<div class="eo40-stat"><div class="eo40-stat-val" style="color:#f9a825">' + ties + '</div><div class="eo40-stat-lbl">Tied</div></div>';
      html += '<div class="eo40-stat"><div class="eo40-stat-val" style="color:#757575">' + nr + '</div><div class="eo40-stat-lbl">No Result</div></div>';
      html += '<div class="eo40-stat"><div class="eo40-stat-val">' + pct + '%</div><div class="eo40-stat-lbl">Win %</div></div>';
    }
    if (upcoming.length > 0) {
      html += '<div class="eo40-stat"><div class="eo40-stat-val" style="color:#1a3a5c">' + upcoming.length + '</div><div class="eo40-stat-lbl">Upcoming</div></div>';
    }
    document.getElementById('eo40-stats').innerHTML = html;
  }

  function renderContent(matches) {
    var grouped = {};
    for (var i = 0; i < matches.length; i++) {
      var s = matches[i].Season;
      if (!grouped[s]) grouped[s] = [];
      grouped[s].push(matches[i]);
    }

    var seasons = Object.keys(grouped).sort(function(a, b) { return parseInt(b) - parseInt(a); });
    var html = '';

    for (var si = 0; si < seasons.length; si++) {
      var season = seasons[si];
      var sMatches = grouped[season];
      var playedCount = sMatches.filter(function(m) { return m.Result.toLowerCase() !== 'upcoming'; }).length;
      var upcomingCount = sMatches.filter(function(m) { return m.Result.toLowerCase() === 'upcoming'; }).length;
      var badgeText = '';
      if (upcomingCount > 0 && playedCount > 0) badgeText = sMatches.length + ' matches';
      else if (upcomingCount > 0) badgeText = upcomingCount + ' fixtures';
      else badgeText = playedCount + ' matches';

      html += '<div class="eo40-section">';
      html += '<div class="eo40-section-title">' + season + ' Season <span class="eo40-section-badge">' + badgeText + '</span></div>';

      // Desktop table
      html += '<div class="eo40-table-wrap"><table class="eo40-table"><thead><tr>';
      html += '<th>Date</th><th>Type</th><th>Home</th><th></th><th>Away</th><th>Venue</th><th>Result</th><th>Details</th><th>Links</th>';
      html += '</tr></thead><tbody>';

      for (var mi = 0; mi < sMatches.length; mi++) {
        var m = sMatches[mi];
        var rc = resultClass(m.Result);
        var rbc = resultBadgeClass(m.Result);
        var bc = badgeClass(m.Tournament);

        var venueHtml = m.Venue;
        if (m.VenueMapURL) {
          venueHtml = '<a href="' + m.VenueMapURL + '" target="_blank" class="eo40-venue-link">' + m.Venue + '</a>';
        }

        var linksHtml = '<div class="eo40-links-cell">';
        if (m.ScorecardURL) linksHtml += '<a href="' + m.ScorecardURL + '" target="_blank" class="eo40-link">Scorecard</a>';
        if (m.VenueMapURL) linksHtml += '<a href="' + m.VenueMapURL + '" target="_blank" class="eo40-link" style="color:#546e7a">Map</a>';
        linksHtml += '</div>';

        html += '<tr class="' + rc + '">';
        html += '<td style="white-space:nowrap;">' + m.Date.replace(/ \d{4}$/, '') + '</td>';
        html += '<td><span class="eo40-badge ' + bc + '">' + m.Tournament + '</span></td>';
        html += '<td>' + teamCellHTML(m.HomeTeam, m.HomeEmblem) + '</td>';
        html += '<td style="color:#bbb;font-weight:700;font-size:0.75rem;text-align:center">vs</td>';
        html += '<td>' + teamCellHTML(m.AwayTeam, m.AwayEmblem) + '</td>';
        html += '<td style="font-size:0.78rem">' + venueHtml + '</td>';
        html += '<td><span class="eo40-result ' + rbc + '">' + m.Result.toUpperCase() + '</span></td>';
        html += '<td style="font-size:0.75rem;color:#555">' + m.Details + '</td>';
        html += '<td>' + linksHtml + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table></div>';

      // Mobile cards
      html += '<div class="eo40-cards">';
      for (var ci = 0; ci < sMatches.length; ci++) {
        var m2 = sMatches[ci];
        var rc2 = resultClass(m2.Result);
        var rbc2 = resultBadgeClass(m2.Result);
        var bc2 = badgeClass(m2.Tournament);
        var homeImg = m2.HomeEmblem ? '<img src="images/' + m2.HomeEmblem + '" alt="">' : '';
        var awayImg = m2.AwayEmblem ? '<img src="images/' + m2.AwayEmblem + '" alt="">' : '';

        html += '<div class="eo40-card ' + rc2 + '">';
        html += '<div class="eo40-card-top">';
        html += '<span class="eo40-card-date">' + m2.Date.replace(/ \d{4}$/, '') + '</span>';
        html += '<div class="eo40-card-badges"><span class="eo40-badge ' + bc2 + '">' + m2.Tournament + '</span> <span class="eo40-result ' + rbc2 + '">' + m2.Result.toUpperCase() + '</span></div>';
        html += '</div>';
        html += '<div class="eo40-card-teams">';
        html += '<div class="eo40-card-team">' + homeImg + '<span>' + shortTeam(m2.HomeTeam) + '</span></div>';
        html += '<div class="eo40-card-vs">VS</div>';
        html += '<div class="eo40-card-team">' + awayImg + '<span>' + shortTeam(m2.AwayTeam) + '</span></div>';
        html += '</div>';
        html += '<div class="eo40-card-bottom">';
        html += '<div class="eo40-card-detail">' + m2.Details + '</div>';
        if (m2.Venue) {
          if (m2.VenueMapURL) {
            html += '<div class="eo40-card-venue"><a href="' + m2.VenueMapURL + '" target="_blank" class="eo40-venue-link">&#x1F4CD; ' + m2.Venue + '</a></div>';
          } else {
            html += '<div class="eo40-card-venue">&#x1F4CD; ' + m2.Venue + '</div>';
          }
        }
        html += '<div class="eo40-card-links">';
        if (m2.ScorecardURL) html += '<a href="' + m2.ScorecardURL + '" target="_blank" class="eo40-card-link">Scorecard</a>';
        if (m2.VenueMapURL) html += '<a href="' + m2.VenueMapURL + '" target="_blank" class="eo40-card-link">Map</a>';
        html += '</div></div></div>';
      }
      html += '</div>';

      html += '</div>';
    }

    document.getElementById('eo40-content').innerHTML = html;
  }

  function filterAndRender(season) {
    var filtered = [];
    if (season === 'all') {
      filtered = allMatches;
    } else {
      for (var i = 0; i < allMatches.length; i++) {
        if (allMatches[i].Season === season) filtered.push(allMatches[i]);
      }
    }
    renderStats(filtered);
    renderContent(filtered);
  }

  document.getElementById('eo40-tabs').addEventListener('click', function(e) {
    if (!e.target.classList.contains('eo40-tab')) return;
    var tabs = document.querySelectorAll('.eo40-tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    e.target.classList.add('active');
    filterAndRender(e.target.getAttribute('data-season'));
  });

  // Fetch CSV data
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CSV_URL + '?t=' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      allMatches = parseCSV(xhr.responseText);
      document.getElementById('eo40-loading').style.display = 'none';
      filterAndRender('all');
    } else {
      document.getElementById('eo40-loading').textContent = 'Unable to load fixtures data. Please try refreshing the page.';
    }
  };
  xhr.onerror = function() {
    document.getElementById('eo40-loading').textContent = 'Unable to load fixtures data. Please try refreshing the page.';
  };
  xhr.send();
})();
</script>

</body>
</html>
